# Fabel Workflow Tdd Feature Development

## Action

Follow the tdd-feature-development workflow:
1. Create or update the implementation file for the new feature/service (e.g., src/core/feature.ts).
2. Create or update the corresponding test file (e.g., src/core/feature.test.ts).
3. If needed, add or update related service or contract files (e.g., src/services/service.ts, src/testing/doubles.ts).

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: src/core/*.ts, src/core/*.test.ts, src/services/*.ts

