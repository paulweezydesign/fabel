<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>fabel — Approval UI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="masthead">
      <div class="masthead__inner">
        <h1 class="brand">fabel</h1>
        <p class="tagline">Agent workflows with human approval gates</p>
      </div>
    </header>

    <main class="layout">
      <section class="panel" aria-labelledby="workflows-heading">
        <h2 id="workflows-heading">Workflows</h2>
        <p class="panel__hint">Pick a workflow and start a run.</p>
        <ul id="workflow-list" class="workflow-list">
          <li class="empty">Loading workflows…</li>
        </ul>
      </section>

      <section class="panel panel--run" aria-labelledby="run-heading">
        <div class="run-header">
          <h2 id="run-heading">Run</h2>
          <span id="run-status" class="badge badge--idle" hidden></span>
        </div>
        <p id="run-placeholder" class="panel__hint">
          No run yet — start a workflow from the left.
        </p>
        <div id="run-detail" hidden>
          <p class="run-meta">
            <span class="run-meta__label">Workflow ID</span>
            <code id="run-id"></code>
          </p>
          <ol id="step-list" class="step-list"></ol>
        </div>

        <div id="artifacts" hidden>
          <h3 class="artifacts-heading">Artifacts</h3>
          <div id="artifact-list" class="artifact-list"></div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
